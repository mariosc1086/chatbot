<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chatbot IPC</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
}

.container {
    width: 500px;
    margin-top: 40px;
}

.chatbox {
    background: white;
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.mensaje {
    margin: 10px 0;
}

.user {
    text-align: right;
    color: blue;
}

.bot {
    text-align: left;
    color: green;
}

.input-area {
    margin-top: 10px;
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🤖 Chatbot IPC Perú</h2>

<div id="chat" class="chatbox"></div>

<div class="input-area">
    <input type="text" id="pregunta" placeholder="Ej: IPC Lima diciembre 2025">
    <button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

// 🔥 CAMBIA ESTA URL POR LA DE RENDER
const url = "https://chatbot-avdd.onrender.com/chat";

function agregarMensaje(texto, tipo) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");

    div.classList.add("mensaje", tipo);
    div.innerText = texto;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function enviar() {

    let pregunta = document.getElementById("pregunta").value;

    if (pregunta.trim() === "") return;

    agregarMensaje("👤 " + pregunta, "user");

    document.getElementById("pregunta").value = "";

    try {
        let res = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ texto: pregunta })
        });

        let data = await res.json();

        agregarMensaje("🤖 " + data.respuesta, "bot");

    } catch (error) {
        agregarMensaje("⚠️ Error de conexión con el servidor", "bot");
    }
}
</script>

</body>
</html>
